<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>대구 아파트 실거래가</title>
<meta name="description" content="대구 아파트 실거래가 조회 · 신고가 알림">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── CSS 변수 ──────────────────────────────────────────── */
:root{
  --green:#03c75a; --green-d:#02a84b; --green-bg:#f0fdf6;
  --red:#e84c3d;   --red-bg:#fff5f4;
  --bg:#f2f3f5;    --bg2:#fafafa;
  --card:#fff;
  --b1:#111; --b2:#333; --b3:#666; --b4:#999; --b5:#bbb;
  --border:#e8e8e8; --border2:#f0f0f0;
  --radius:14px;
  --shadow:0 2px 8px rgba(0,0,0,.08);
  --tab-h:60px;
  --hdr-h:54px;
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ── Reset ─────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Pretendard',-apple-system,'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--b1);
  padding-bottom:100px!important;
  font-size:14px;line-height:1.5;
}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{text-decoration:none;color:inherit}
svg{display:block}

/* ── Header ─────────────────────────────────────────────── */
.hdr{
  position:sticky;top:0;z-index:200;
  background:#fff;border-bottom:1px solid var(--border);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  height:var(--hdr-h);
}
.hdr-inner{
  display:flex;align-items:center;gap:10px;
  height:100%;padding:0 14px;max-width:600px;margin:0 auto;
}
.hdr-center{flex:1;min-width:0}
.hdr-title{font-size:15px;font-weight:800;color:var(--b1);letter-spacing:-.3px}
.hdr-search-btn{
  padding:6px;border-radius:8px;color:var(--b3);font-size:18px;
  transition:background .15s;line-height:1;
}
.hdr-search-btn:hover{background:var(--bg)}

/* ── Bottom tab bar ─────────────────────────────────────── */
.tab-bar{
  position:fixed!important;bottom:0!important;
  left:50%!important;right:auto!important;
  transform:translateX(-50%)!important;
  width:100%!important;max-width:600px!important;
  z-index:200;
  height:calc(var(--tab-h) + var(--safe-b));
  background:#fff;border-top:1px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-b);
  box-shadow:0 -2px 8px rgba(0,0,0,.08);
}
.tab-inner{
  width:100%;display:flex;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:3px;padding:6px 4px;
  color:var(--b4);transition:color .15s;font-size:11px;font-weight:500;
}
.tab-btn .t-icon{font-size:20px;line-height:1}
.tab-btn.active{color:var(--green)}
.tab-btn:hover{color:var(--b2)}

/* ── Pages ──────────────────────────────────────────────── */
.page{max-width:600px;margin:0 auto;padding-bottom:80px!important}

/* ── Date strip ─────────────────────────────────────────── */
.date-strip{
  background:#fff;border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  user-select:none;
}
.date-nav-row{display:flex;align-items:center;justify-content:center;gap:14px}
.date-arr{
  width:36px;height:36px;border-radius:10px;
  border:1.5px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--b3);transition:all .15s;
  flex-shrink:0;
}
.date-arr:hover:not(:disabled){border-color:var(--green);color:var(--green)}
.date-arr:disabled{color:var(--b5);border-color:#f0f0f0;cursor:not-allowed}
.date-main{font-size:22px;font-weight:800;color:var(--b1);letter-spacing:-.5px;min-width:190px;text-align:center}
.date-sub{font-size:11px;color:var(--b4);text-align:center}
.date-sub b{color:var(--b2);font-weight:600}

/* ── District chips ─────────────────────────────────────── */
.dist-wrap{
  background:#fff;border-bottom:1px solid var(--border);
  padding:10px 0;
  position:relative;
}
.dist-scroll-btn{
  position:absolute;top:0;bottom:0;width:44px;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
  color:var(--b4);font-size:13px;z-index:2;
  padding:0;transition:opacity .2s,color .15s;
}
.dist-scroll-btn.left{
  left:0;
  background:linear-gradient(to left,transparent 0%,#fff 65%);
}
.dist-scroll-btn.right{
  right:0;
  background:linear-gradient(to right,transparent 0%,#fff 65%);
}
.dist-scroll-btn:hover{color:var(--b2)}
.dist-wrap.scroll-start .dist-scroll-btn.left{opacity:0;pointer-events:none}
.dist-wrap.scroll-end   .dist-scroll-btn.right{opacity:0;pointer-events:none}
.dist-wrap:not(.scroll-end) .dist-scroll-btn.right{animation:distPulse 2s infinite}
@keyframes distPulse{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}
.dist-scroll{
  display:flex;gap:7px;overflow-x:auto;
  padding:2px 14px 4px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.dist-scroll::-webkit-scrollbar{display:none}
.dist-chip{
  flex-shrink:0;display:flex;flex-direction:column;align-items:center;
  padding:7px 13px 5px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;
  font-size:13px;font-weight:600;color:var(--b3);
  transition:all .15s;position:relative;white-space:nowrap;
}
.dist-chip .dc-cnt{font-size:10px;font-weight:500;color:var(--b4);margin-top:1px}
.dist-chip.active{background:var(--b1);color:#fff;border-color:var(--b1)}
.dist-chip.active .dc-cnt{color:rgba(255,255,255,.6)}
.dist-chip:hover:not(.active){border-color:var(--b2);color:var(--b2)}
.dist-chip .nh-dot{
  position:absolute;top:5px;right:7px;
  width:6px;height:6px;background:var(--red);border-radius:50%;
}

/* ── Sort toolbar ───────────────────────────────────────── */
.sort-bar{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;row-gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--border2);
  background:var(--bg2);margin-bottom:20px;
}
.sort-btn{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;
  font-size:12px;font-weight:600;color:var(--b3);transition:all .15s;
}
.sort-btn.active{background:var(--green);color:#fff;border-color:var(--green)}
.sort-btn:hover:not(.active){border-color:var(--b2);color:var(--b2)}
.sort-sep{flex-shrink:0;color:var(--border);font-size:16px;margin-right:auto}
.toggle-nh{
  flex-shrink:0;padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;
  font-size:12px;font-weight:600;color:var(--b3);transition:all .15s;
  display:flex;align-items:center;gap:5px;
}
.toggle-nh.active{background:var(--red-bg);color:var(--red);border-color:var(--red)}
#toggleCancel.active{background:#d1fae5;color:#065f46;border-color:#10b981}

/* ── Card list ──────────────────────────────────────────── */
.card-list{display:flex;flex-direction:column;gap:0}

/* ── Transaction card ───────────────────────────────────── */
.tx-card{
  background:var(--card);
  border-bottom:1px solid var(--border2);
  padding:14px 16px;cursor:pointer;
  transition:background .12s;
  position:relative;
}
.tx-card:active{background:#fafafa}
.tx-card.new-high{
  border:2px solid #ef4444;
  box-shadow:0 0 0 4px rgba(239,68,68,.08);
  z-index:1;
}
.tx-card.new-high::before{
  content:"신고가";
  position:absolute;top:-10px;left:12px;
  background:#ef4444;color:#fff;
  padding:2px 10px;border-radius:4px;
  font-size:11px;font-weight:700;letter-spacing:.5px;
}

/* 해제 거래 */
.cancel-badge{
  display:inline-block;padding:2px 8px;
  background:#6b7280;color:#fff;
  font-size:11px;font-weight:700;border-radius:4px;
  letter-spacing:.5px;flex-shrink:0;
}
.tx-card.is-cancelled{opacity:.85}
.tx-card.is-cancelled:hover{opacity:1}
.card-price.cancelled{text-decoration:line-through;color:#9ca3af}
.cancel-date{font-size:12px;color:#6b7280;margin-bottom:6px}
.tr-cancelled td{color:#9ca3af}
.tr-cancelled .td-price{text-decoration:line-through}

/* 카드 헤더: 단지명 + 우상단 별표 */
.card-hdr{display:flex;align-items:flex-start;gap:8px;padding-right:34px;margin-bottom:6px}
.card-apt-name{font-size:16px;font-weight:800;color:var(--b1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-abs{
  position:absolute;top:10px;right:10px;
  background:none;border:none;font-size:20px;
  cursor:pointer;color:#d1d5db;line-height:1;padding:2px;
  transition:color .15s;
}
.fav-abs.on{color:#fbbf24}

/* 카드 바디: 좌측 정보 + 우측 차트 */
.card-body{display:grid;grid-template-columns:1fr 180px;gap:10px;align-items:start;margin-bottom:6px}
.spark-wrap-lg{flex-shrink:0;align-self:stretch;display:flex;align-items:center;min-width:0}
.spark-wrap-lg svg{width:100%;height:80px;display:block;overflow:visible}
.chart-empty{display:flex;align-items:center;justify-content:center;width:100%;height:80px;color:var(--b5);font-size:11px;background:var(--bg2);border-radius:6px}
@media(max-width:400px){
  .card-body{grid-template-columns:1fr 130px}
}

/* 가격 */
.card-price{font-size:22px;font-weight:900;color:var(--b1);letter-spacing:-.5px;margin-bottom:4px;line-height:1.2}
.card-price.p-high{color:#c0392b}
.card-prevhi{font-size:11px;color:var(--b4);margin-bottom:6px}
.card-prevhi .ph-val{font-weight:700}
.card-prevhi .ph-up{color:var(--red)}
.card-prevhi .ph-dn{color:var(--green)}
.card-prevhi .ph-eq{color:var(--b3)}

/* 메타 정보 */
.card-meta{display:flex;flex-wrap:wrap;gap:4px 10px;font-size:12px;color:var(--b3);margin-bottom:4px}
.card-meta span::before{content:'';display:inline-block}
.card-meta .sep{color:var(--border)}

/* 푸터 */
.card-footer{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--b4);border-top:1px solid var(--border2);
  padding-top:8px;flex-wrap:wrap;
}
.card-footer .cf-item{display:flex;align-items:center;gap:3px}
.card-footer .cf-sep{color:var(--border)}

/* ── Loading / Error / Empty ─────────────────────────────── */
.state-box{text-align:center;padding:60px 16px;color:var(--b4)}
.spinner{
  display:inline-block;width:24px;height:24px;
  border:3px solid var(--border);border-top-color:var(--green);
  border-radius:50%;animation:spin .7s linear infinite;
  vertical-align:middle;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.err-box{text-align:center;padding:60px 16px;color:var(--red);line-height:1.8}
.err-box code{background:#fee;padding:2px 6px;border-radius:4px;font-size:12px}

/* ── CSV 모달 ────────────────────────────────────────────── */
.csv-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:200;align-items:center;justify-content:center;
}
.csv-overlay.open{display:flex;}
.csv-sheet{
  background:var(--card);border-radius:20px;
  width:min(480px,92%);padding:24px 20px 32px;
  max-height:85vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.csv-title{font-size:17px;font-weight:800;margin-bottom:20px;}
.csv-label{font-size:12px;font-weight:700;color:var(--b3);margin-bottom:6px;}
.csv-dates{display:flex;gap:8px;margin-bottom:16px;}
.csv-dates input[type=date]{
  flex:1;padding:9px 10px;border:1px solid var(--border);border-radius:10px;
  font-size:14px;background:var(--card);color:var(--b1);
}
.csv-quick{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.csv-qbtn{
  padding:6px 12px;border-radius:20px;border:1px solid var(--border);
  font-size:12px;font-weight:600;background:var(--card);color:var(--b2);
  cursor:pointer;
}
.csv-qbtn:active{background:var(--green);color:#fff;border-color:var(--green);}
.csv-districts{display:flex;flex-wrap:wrap;gap:6px 10px;margin-bottom:24px;}
.csv-dist-cb{display:flex;align-items:center;gap:4px;font-size:13px;cursor:pointer;}
.csv-dist-cb input{accent-color:var(--green);}
.csv-actions{display:flex;gap:10px;}
.csv-dl-btn{
  flex:1;padding:14px;border-radius:12px;background:var(--green);
  color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;
}
.csv-cancel-btn{
  padding:14px 20px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--b2);font-size:15px;font-weight:600;cursor:pointer;
}

/* ── Load more ──────────────────────────────────────────── */
.more-wrap{padding:16px;padding-bottom:40px!important;text-align:center}
.more-btn{
  width:100%;padding:14px;border-radius:12px;
  background:var(--green);color:#fff;
  font-size:14px;font-weight:700;
  box-shadow:0 3px 10px rgba(3,199,90,.25);
  transition:background .15s;
}
.more-btn:active{background:var(--green-d)}

/* ── Bottom sheet ───────────────────────────────────────── */
.sheet-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.sheet-overlay.open{opacity:1;pointer-events:all}
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:510;
  background:#fff;border-radius:20px 20px 0 0;
  max-height:80vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);
  padding:0 0 calc(16px + var(--safe-b));
  max-width:600px;margin:0 auto;
}
.bottom-sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.sheet-title{font-size:15px;font-weight:700;padding:0 18px 12px;color:var(--b1)}
.sheet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 14px}
.sheet-chip{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 8px 8px;border-radius:12px;
  border:1.5px solid var(--border);background:#fff;
  font-size:14px;font-weight:600;color:var(--b2);
  transition:all .15s;position:relative;
}
.sheet-chip .sc-cnt{font-size:11px;color:var(--b4);margin-top:2px}
.sheet-chip.active{background:var(--b1);color:#fff;border-color:var(--b1)}
.sheet-chip.active .sc-cnt{color:rgba(255,255,255,.6)}
.sheet-chip .sc-dot{position:absolute;top:8px;right:8px;width:6px;height:6px;background:var(--red);border-radius:50%}
.sheet-close{
  display:block;width:calc(100% - 28px);margin:14px auto 0;
  padding:14px;border-radius:12px;
  background:var(--bg);color:var(--b2);
  font-size:14px;font-weight:700;
}

/* ── Detail panel ───────────────────────────────────────── */
.detail-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:600;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.detail-overlay.open{opacity:1;pointer-events:all}
.detail-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:610;
  background:#fff;border-radius:16px 16px 0 0;
  height:92vh;max-height:92vh;
  display:flex;flex-direction:column;
  transform:translateY(110%);transition:transform .3s cubic-bezier(.32,1,.23,1);
  box-shadow:0 -4px 24px rgba(0,0,0,.14);
}
.detail-panel.open{transform:translateY(0)}
.detail-hdr{
  padding:0 18px 14px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.detail-hdr .dh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 14px}
.detail-title-row{display:flex;align-items:center;gap:8px;padding-right:44px;margin-bottom:2px}
.detail-title{font-size:17px;font-weight:800;color:var(--b1);flex:1;min-width:0}
.map-link-btn{flex-shrink:0;padding:5px 11px;background:var(--green);color:#fff;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer}
.map-link-btn:hover{opacity:.85}
.detail-sub{font-size:12px;color:var(--b4);margin-top:0;margin-bottom:12px}
.detail-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;
  background:var(--bg);color:var(--b3);font-size:16px;
  display:flex;align-items:center;justify-content:center;
}
/* 거래 유형 탭 */
.detail-type-tabs{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:var(--bg2);border-radius:10px;padding:3px;
  margin-bottom:12px;
}
.dtt-btn{
  padding:7px;border-radius:8px;font-size:13px;font-weight:600;
  color:var(--b4);transition:all .15s;
}
.dtt-btn.active{background:#fff;color:var(--b1);box-shadow:0 1px 4px rgba(0,0,0,.1)}
.dtt-btn:disabled{opacity:.35;cursor:not-allowed}
/* 면적 토글 */
.detail-area-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-radius:10px;border:1.5px solid var(--border);
  background:#fff;font-size:13px;font-weight:700;color:var(--b1);
  transition:border-color .15s;
}
.detail-area-toggle:hover{border-color:var(--green)}
.dat-arrow{font-size:10px;color:var(--b4);transition:transform .2s;margin-left:6px}
.detail-area-toggle.expanded .dat-arrow{transform:rotate(180deg)}
.detail-area-chips{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:10px 0 2px;
}
/* 면적 탭 칩 (기존 .area-tab 유지, 새 컨테이너에서 사용) */
.area-tab{
  flex-shrink:0;white-space:nowrap;padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--border);background:#fff;
  font-size:12px;font-weight:600;color:var(--b3);transition:all .15s;
}
.area-tab.active{background:var(--green);color:#fff;border-color:var(--green)}
/* 스크롤 바디 */
.detail-body{overflow-y:auto;padding:16px 16px 32px;flex:1;min-height:0}
.detail-chart-wrap{height:130px;margin-bottom:12px;padding:4px 0}
/* 통계 카드 (스크롤 영역으로 이동) */
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
@media(max-width:360px){.detail-stats{grid-template-columns:repeat(2,1fr)}}
.ds-item{background:#f9fafb;border-radius:10px;padding:10px 8px;text-align:center}
.ds-label{font-size:10px;color:var(--b4);font-weight:500;margin-bottom:3px}
.ds-val{font-size:13px;font-weight:800;color:var(--b1);line-height:1.2}
.ds-val.high{color:var(--red)}
.ds-val.low{color:#3b82f6}
.ds-sub{font-size:10px;color:var(--b5);margin-top:2px}
.trade-tbl{width:100%;border-collapse:collapse;font-size:13px}
.trade-tbl th{
  background:var(--bg2);padding:8px 10px;
  text-align:left;color:var(--b4);font-weight:500;
  border-bottom:1px solid var(--border);
}
.trade-tbl td{padding:9px 10px;border-bottom:1px solid var(--border2);color:var(--b2)}
.trade-tbl .td-price{font-weight:800;color:var(--b1);text-align:right}
.trade-tbl .td-nh{color:var(--red)}
.trade-tbl .td-lo{color:var(--green)}

/* ── Favorites page ─────────────────────────────────────── */
.fav-search-box{
  background:#fff;border-bottom:1px solid var(--border);
  padding:12px 14px;position:relative;
}
.fav-inp{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--border);font-size:14px;
  outline:none;font-family:inherit;transition:border .15s;
}
.fav-inp:focus{border-color:var(--green)}
.ac-list{
  position:absolute;left:14px;right:14px;top:100%;margin-top:2px;
  background:#fff;border:1px solid var(--border);border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:300;
  max-height:240px;overflow-y:auto;display:none;
}

<script>
/* ══════════════════════════════════════════════════════════
   상수 & 전역 상태
══════════════════════════════════════════════════════════ */
const DISTRICTS = ['전체','중구','동구','서구','남구','북구','수성구','달서구','달성군','군위군'];
const DIST_VALS = ['중구','동구','서구','남구','북구','수성구','달서구','달성군','군위군'];
const WEEKDAYS  = ['일','월','화','수','목','금','토'];
const MAX_BACK  = 180;
const PAGE      = 40;

let DB         = null;
let HOGAN      = {};   // 호갱노노 리뷰 수
let _tab       = 'home';
let _selDate   = '';
let _targetKey = '';    // 표시할 날짜 (신고일 or 계약일)
let _districts = new Set(); // 다중 선택 (empty = 전체)
let _sort      = 'price_d';
let _nhOnly      = false;
let _hideCancel  = false;
let _filtered  = [];
let _visible   = PAGE;
let _sparkCache   = {};
let _monthlyCache = {};
let _useRgst   = false;
let HIST       = {};
let _detailChart = null;
let _detailAreas = [];
let _hlDate='', _hlAmt=0;
const AREA_COLORS=['#10b981','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4'];


/* ══════════════════════════════════════════════════════════
   유틸
══════════════════════════════════════════════════════════ */
function pad(n){ return String(n).padStart(2,'0'); }
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); const r=new Date(d); return `${r.getFullYear()}-${pad(r.getMonth()+1)}-${pad(r.getDate())}`; }
function weekday(iso){ return WEEKDAYS[new Date(iso+'T00:00:00').getDay()]; }

function fmtAmt(v){
  if(!v) return '-';
  const a=Math.abs(v), s=v<0?'-':'';
  if(a>=10000){
    const uk=Math.floor(a/10000), rem=a%10000;
    return s+(rem?`${uk}억 ${rem.toLocaleString()}만`:`${uk}억`);
  }
  return s+a.toLocaleString()+'만원';
}
function fmtArea(a){ if(!a) return '-'; const p=Math.round(a/0.78/3.3058); return `전용 ${Math.round(a)}㎡(${p}평)`; }
function areaKey(a){ return `${Math.round(a)}㎡`; }
function priceCls(amt){ return amt>=100000?'p-high':''; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2200);
}

/* ══════════════════════════════════════════════════════════
   데이터 로드
══════════════════════════════════════════════════════════ */
async function init(){
  try{
    const [txRes, hgRes, histRes] = await Promise.allSettled([
      fetch('data/transactions.json'),
      fetch('data/hogangnono_reviews.json'),
      fetch('data/history.json'),
    ]);
    if(txRes.status==='rejected'||!txRes.value.ok) throw new Error('transactions.json 로드 실패');
    DB = await txRes.value.json();
    if(hgRes.status==='fulfilled'&&hgRes.value.ok) HOGAN = await hgRes.value.json();
    if(histRes.status==='fulfilled'&&histRes.value.ok) HIST = await histRes.value.json();
    _useRgst = DB.transactions.some(t=>t.rgst_date);
    onLoaded();
  }catch(e){
    document.getElementById('loadEl').style.display='none';
    document.getElementById('errEl').style.display='block';
    document.getElementById('errEl').innerHTML=
      `데이터 로드 실패: <b>${e.message}</b><br>
       <small style="color:#aaa">로컬 테스트 시 <code>python -m http.server</code> 실행 후 접속</small>`;
  }
}

function onLoaded(){
  document.getElementById('loadEl').style.display='none';
  document.getElementById('homeMain').style.display='block';

  document.getElementById('dataGenAt').textContent  = (DB.generated_at||'-').replace('T',' ');
  document.getElementById('dataTotalCnt').textContent = (DB.total||0).toLocaleString()+'건';

// rgst_date 없는 거래(신고 대기 중)는 deal_date로 폴백
function dateField(t){ return _useRgst ? (t.rgst_date || t.deal_date) : t.deal_date; }

function getTargetKey(selDate){
  if(!DB?.transactions?.length) return null;
  const cutoff=selDate;
  const dates=[...new Set(DB.transactions.map(t=>dateField(t)).filter(Boolean))].sort();
  let target=null;
  for(const d of dates) if(d<=cutoff) target=d;
  return target;
}

function updateDateUI(){
  const today=todayISO(), minDate=addDays(today,-MAX_BACK);
  document.getElementById('dateLabel').textContent=`${_selDate} (${weekday(_selDate)})`;
  document.getElementById('prevBtn').disabled=_selDate<=minDate;
  document.getElementById('nextBtn').disabled=_selDate>=today;

  _targetKey=getTargetKey(_selDate);
  const sub=document.getElementById('dateSubLabel');
  if(_targetKey){
    // targetKey 날짜에 실제 신고일 데이터가 있으면 '신고일', 없으면 '계약일(신고대기)'
    const hasRgst=DB.transactions.some(t=>t.rgst_date===_targetKey);
    const label=hasRgst?'신고일':'계약일(신고대기)';
    sub.innerHTML=`${label} <b>${_targetKey}</b> 기준 데이터`;
  } else {
    sub.textContent='해당 기간 데이터 없음';
  }
}

function changeDate(delta){
  const today=todayISO(), minDate=addDays(today,-MAX_BACK);
  const next=addDays(_selDate,delta);
  if(next>today||next<minDate) return;
  _selDate=next; applyFilter();
}

function calcDistStats(){
  if(!DB||!_targetKey) return {counts:{},highs:{}};
  const base=DB.transactions.filter(t=>dateField(t)===_targetKey);
  const counts={}, highs={};
  base.forEach(t=>{
    counts[t.gugun]=(counts[t.gugun]||0)+1;
    if(isNewHigh(t)) highs[t.gugun]=true;
  });
  return {counts,highs};
}

function buildDistChips(){
  const {counts,highs}=calcDistStats();
  const scroll=document.getElementById('distScroll');
  scroll.innerHTML=DISTRICTS.map(d=>{
    const val=d==='전체'?'':d;
    const isAll=d==='전체';
    const active=isAll?_districts.size===0:_districts.has(d);
    const cnt=isAll
      ? Object.values(counts).reduce((s,v)=>s+v,0)
      : (counts[val]||0);
    const hasHigh=isAll?Object.values(highs).some(Boolean):highs[val];
    const dot=hasHigh?'<span class="nh-dot"></span>':'';
    const check=active?'<span class="dc-check">✓</span>':'';
    return `<button class="dist-chip${active?' active':''}"
      data-v="${val}" onclick="toggleDist('${val}')">
      ${dot}${esc(d)}<span class="dc-arrow">›</span>${check}
      <span class="dc-cnt">${cnt||'-'}</span>
    </button>`;
  }).join('');
  updateDistScrollIndicator();
}

function updateDistScrollIndicator(){
  const scroll=document.getElementById('distScroll');
  if(!scroll) return;
  const wrap=scroll.closest('.dist-wrap');
  if(!wrap) return;
  const syncState=()=>{
    wrap.classList.toggle('scroll-start', scroll.scrollLeft<=4);
    wrap.classList.toggle('scroll-end',   scroll.scrollLeft+scroll.clientWidth>=scroll.scrollWidth-4);
  };
  // innerHTML 직후엔 레이아웃 미계산 → rAF 2회 대기 후 측정
  requestAnimationFrame(()=>requestAnimationFrame(syncState));
  if(!scroll._scrollListenerAdded){
    scroll.addEventListener('scroll', syncState, {passive:true});
    scroll._scrollListenerAdded=true;
  }
}

function distScrollBy(amount){
  const scroll=document.getElementById('distScroll');
  if(scroll) scroll.scrollBy({left:amount,behavior:'smooth'});
}

function toggleDist(val){
  if(val===''){

/* ══════════════════════════════════════════════════════════
   신고가 판별
══════════════════════════════════════════════════════════ */
function isNewHigh(t){
  if(isCancelled(t)||!DB?.historical_highs||!t.amount) return false;
  const k=`${t.apt_name}|${areaKey(t.area)}`;
  const prev=DB.historical_highs[k]||0;
  return prev>0 && t.amount>prev;
}

function prevHighDiff(t){
  if(isCancelled(t)||!DB?.historical_highs||!t.amount) return null;
  const k=`${t.apt_name}|${areaKey(t.area)}`;
  const prev=DB.historical_highs[k]||0;
  if(!prev) return null;
  return t.amount-prev;
}

/* ══════════════════════════════════════════════════════════
   스파크라인 SVG (월별 평균가 기반)
══════════════════════════════════════════════════════════ */
function getMonthlyAvg(aptName){
  if(_monthlyCache[aptName]) return _monthlyCache[aptName];
  const groups={};
  (DB?.transactions||[])
    .filter(t=>t.apt_name===aptName && t.amount>0 && !isCancelled(t))
    .forEach(t=>{
      const ym=t.deal_date.slice(0,7);
      if(!groups[ym]) groups[ym]=[];
      groups[ym].push(t.amount);
    });
  const result=Object.entries(groups)
    .map(([ym,prices])=>({
      ym,
      avg:Math.round(prices.reduce((a,b)=>a+b,0)/prices.length),
      cnt:prices.length,
    }))
    .sort((a,b)=>a.ym.localeCompare(b.ym))
    .slice(-24);
  _monthlyCache[aptName]=result;
  return result;
}

function makeSparkMonthly(aptName,W=180,H=80){
  const data=getMonthlyAvg(aptName);
  if(data.length<2) return `<div class="chart-empty">거래 이력 부족</div>`;
  const prices=data.map(d=>d.avg);
  const mn=Math.min(...prices), mx=Math.max(...prices), rng=mx-mn||1;
  const pd=4;
  const pts=data.map((d,i)=>({
    x:pd+(i/(data.length-1))*(W-pd*2),
    y:pd+(1-(d.avg-mn)/rng)*(H-pd*2),
    ym:d.ym, avg:d.avg, cnt:d.cnt,
  }));
  const line=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const fill=`${line} L${(W-pd).toFixed(1)},${H} L${pd},${H} Z`;
  const lc='#10b981';
  const fc='#d1fae5';
  const last=pts[pts.length-1];
  const hoverPts=pts.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="7" fill="transparent" class="spark-hp"><title>${p.ym} 평균 ${fmtAmt(p.avg)} (${p.cnt}건)</title></circle>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="${H}" style="overflow:visible">
    <path d="${fill}" fill="${fc}" opacity="0.5"/>
    <path d="${line}" fill="none" stroke="${lc}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last.x.toFixed(1)}" cy="${last.y.toFixed(1)}" r="3" fill="${lc}" stroke="#fff" stroke-width="1.5"/>
    ${hoverPts}
  </svg>`;
}

function applyFilter(){
  updateDateUI();
  buildDistChips();

  if(!DB||!_targetKey){ _filtered=[]; renderCards(); return; }

  let list=DB.transactions.filter(t=>
    dateField(t)===_targetKey && (_districts.size===0||_districts.has(t.gugun))
  );

  if(_nhOnly) list=list.filter(t=>isNewHigh(t));
  // 해제 거래 존재 여부에 따라 토글 버튼 표시
  document.getElementById('toggleCancel').style.display=list.some(t=>isCancelled(t))?'':'none';
  if(_hideCancel) list=list.filter(t=>!isCancelled(t));

  list.sort((a,b)=>{
    if(_sort==='price_d') return b.amount-a.amount;
    if(_sort==='price_a') return a.amount-b.amount;
    return b.deal_date.localeCompare(a.deal_date);
  });

  _filtered=list;
  _visible=PAGE;
  renderCards();
}

function renderCards(){
  const list=document.getElementById('cardList');
  const wrap=document.getElementById('moreWrap');

  if(!_filtered.length){
    list.innerHTML='<div class="state-box">표시할 거래 내역이 없습니다.</div>';
    wrap.style.display='none'; return;
  }

  list.innerHTML=_filtered.slice(0,_visible).map(t=>cardHTML(t)).join('');
  const rem=_filtered.length-_visible;
  wrap.style.display=rem>0?'':'none';
  if(rem>0) document.querySelector('#moreWrap .more-btn').textContent=`더보기 (${Math.min(PAGE,rem)}건 / 남은 ${rem}건)`;
}

function loadMore(){ _visible+=PAGE; renderCards(); }

<div class="tx-card${high?' new-high':''}${cancelled?' is-cancelled':''}" onclick="openDetail('${safeName}','${ak}','${t.deal_date}',${t.amount})">

function downloadCSV(){
  if(!_filtered.length){ showToast('다운로드할 데이터가 없습니다.'); return; }
  const header=['구군','동','아파트명','전용면적(㎡)','층','건축년도','계약일','신고일','거래금액(만원)','거래유형'];
  const rows=_filtered.map(t=>[
    t.gugun, t.dong, t.apt_name,
    t.area, t.floor, t.build_year,
    t.deal_date, t.rgst_date||'',
    t.amount, t.deal_type,
  ]);
  const csv=[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const bom='\uFEFF';
  const blob=new Blob([bom+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`대구실거래_${_targetKey||_selDate}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`${_filtered.length}건 다운로드 완료`);
}

function renderDetailTrades(ak){
  const histRaw=HIST[_detailApt]||[];
  let trades;
  if(histRaw.length){
    const hf=histRaw.filter(r=>ak==='전체'||r[1]+'㎡'===ak);
    const hKeys=new Set(hf.map(r=>`${r[0]}|${r[1]}|${r[2]}|${r[3]}`));
    const dbExtra=(DB?.transactions||[]).filter(t=>{
      const k=`${t.deal_date}|${Math.round(t.area)}|${t.floor}|${t.amount}`;
      return t.apt_name===_detailApt&&(ak==='전체'||areaKey(t.area)===ak)&&!hKeys.has(k);
    });
    trades=[
      ...hf.map(r=>({deal_date:r[0],area:r[1],floor:r[2],amount:r[3],cdeal_type:'',cdeal_day:''})),
      ...dbExtra.map(t=>({deal_date:t.deal_date,area:Math.round(t.area),floor:t.floor,amount:t.amount,cdeal_type:t.cdeal_type||'',cdeal_day:t.cdeal_day||''}))
    ].sort((a,b)=>b.deal_date.localeCompare(a.deal_date));
  } else {
    trades=(DB?.transactions||[])
      .filter(t=>t.apt_name===_detailApt&&(ak==='전체'||areaKey(t.area)===ak))
      .sort((a,b)=>b.deal_date.localeCompare(a.deal_date))
      .map(t=>({deal_date:t.deal_date,area:Math.round(t.area),floor:t.floor,amount:t.amount,cdeal_type:t.cdeal_type||'',cdeal_day:t.cdeal_day||''}));
  }

  const validTrades=trades.filter(t=>!isCancelled(t));
  const prices=validTrades.map(t=>t.amount);
  const maxP=validTrades.length>1?Math.max(...prices):0;
  const minP=validTrades.length>1?Math.min(...prices):0;

  document.getElementById('detailTbody').innerHTML=trades.map(t=>{
    const canc=isCancelled(t);
    const hKey=`${_detailApt}|${t.area}㎡`;
    const prevHigh=DB?.historical_highs?.[hKey]||0;
    const isNH=!canc&&prevHigh>0&&t.amount>prevHigh;
    const isLo=!canc&&validTrades.length>1&&t.amount===minP;
    const isHl=_hlDate&&t.deal_date===_hlDate&&t.amount===_hlAmt;
    const trCls=canc?'tr-cancelled':'';
    const trStyle=isHl?'style="background:#fffde8"':'';
    const cls=isNH?'td-nh':isLo?'td-lo':'';
    const nhBadge=isNH?'<span style="color:var(--red);font-size:10px;font-weight:700;margin-left:3px">↑신고가</span>':'';
    const cancelTag=canc?`<span style="color:#6b7280;font-size:10px;margin-left:4px">해제 ${fmtCancelDate(t.cdeal_day)}</span>`:'';
    return `<tr class="${trCls}" ${trStyle}>
      <td>${t.deal_date}${nhBadge}</td>
      <td>${t.floor}층</td>
      <td>${fmtArea(t.area)}</td>
      <td class="td-price ${cls}">${fmtAmt(t.amount)}${cancelTag}</td>
    </tr>`;
  }).join('');

  renderDetailChart(validTrades);
}

function fmtAmtShort(v){
  if(!v) return '-';
  if(v>=10000){
    const e=Math.floor(v/10000), r=Math.round((v%10000)/1000);
    if(r>=10) return `${e+1}억`;
    return r===0?`${e}억`:`${e}.${r}억`;
  }
  return `${v.toLocaleString()}만`;
}

function drawDetailLabel(ctx,x,y,manwon,color,pos,area){
  const label=fmtAmtShort(manwon);
  ctx.save();
  ctx.font='bold 11px -apple-system,sans-serif';
  const tw=ctx.measureText(label).width;
  const bw=tw+14, bh=18, r=9, gap=7;
  let bx=x-bw/2;
  let by=pos==='above'?y-gap-bh:y+gap;
  bx=Math.max(area.left,Math.min(area.right-bw,bx));
  // arrow
  ctx.beginPath();
  if(pos==='above'){ctx.moveTo(x,y-5);ctx.lineTo(x-4,by+bh);ctx.lineTo(x+4,by+bh);}
  else{ctx.moveTo(x,y+5);ctx.lineTo(x-4,by);ctx.lineTo(x+4,by);}
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
  // badge
  ctx.beginPath();
  ctx.moveTo(bx+r,by);ctx.lineTo(bx+bw-r,by);
  ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+r);
  ctx.lineTo(bx+bw,by+bh-r);
  ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-r,by+bh);
  ctx.lineTo(bx+r,by+bh);
  ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-r);
  ctx.lineTo(bx,by+r);
  ctx.quadraticCurveTo(bx,by,bx+r,by);
  ctx.closePath();ctx.fillStyle=color;ctx.fill();
  // text
  ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(label,bx+bw/2,by+bh/2);
  ctx.restore();
}

function renderDetailChart(trades){
  const wrap=document.getElementById('detailChartWrap');
  if(_detailChart){_detailChart.destroy();_detailChart=null;}
  if(trades.length<2){wrap.style.display='none';return;}

  const isAll=(_detailArea==='전체');
  let datasets, allLabels, showLegend, inlinePlugins=[];

  if(isAll){
    const groups={};
    trades.forEach(t=>{
      const k=t.area+'㎡';
      if(!groups[k]) groups[k]=[];
      groups[k].push(t);
    });
    const sortedAreas=Object.keys(groups).sort((a,b)=>parseFloat(a)-parseFloat(b));
    allLabels=[...new Set(trades.map(t=>t.deal_date.slice(0,7)))].sort();
    datasets=sortedAreas.map((ak,idx)=>{
      const color=AREA_COLORS[idx%AREA_COLORS.length];
      const byMonth={};
      groups[ak].forEach(t=>{
        const m=t.deal_date.slice(0,7);
        if(!byMonth[m]) byMonth[m]=[];
        byMonth[m].push(t.amount);
      });
      const data=allLabels.map(l=>{
        const vs=byMonth[l];
        return vs?Math.round(vs.reduce((s,v)=>s+v,0)/vs.length):null;
      });
      return{
        label:fmtArea(parseFloat(ak)),
        data,
        borderColor:color,
        backgroundColor:color+'20',
        borderWidth:1.5,
        pointRadius:groups[ak].length>60?0:2,
        pointHoverRadius:5,
        fill:false,
        tension:0.3,
        spanGaps:true,
      };
    });
    showLegend=sortedAreas.length>1;
    wrap.style.height=showLegend?'190px':'140px';
  } else {
    const pts=trades.slice().sort((a,b)=>a.deal_date.localeCompare(b.deal_date));
    allLabels=pts.map(t=>t.deal_date.slice(0,7));
    const idx=_detailAreas.indexOf(_detailArea);
    const color=idx>=0?AREA_COLORS[idx%AREA_COLORS.length]:'#03c75a';

    const prices=pts.map(t=>t.amount);
    const peakIdx=prices.indexOf(Math.max(...prices));
    const troughIdx=prices.indexOf(Math.min(...prices));
    const hasPT=peakIdx!==troughIdx;

    const ptBg=prices.map((_,i)=>i===peakIdx?'#ef4444':i===troughIdx?'#3b82f6':color);
    const ptBd=prices.map((_,i)=>(i===peakIdx||i===troughIdx)?'#fff':color);
    const ptBdW=prices.map((_,i)=>(i===peakIdx||i===troughIdx)?2:0);
    const ptR=prices.map((_,i)=>(i===peakIdx||i===troughIdx)?5:(pts.length>80?0:2));

    datasets=[{
      label:fmtArea(parseFloat(_detailArea)),
      data:prices,
      borderColor:color,
      backgroundColor:color+'20',
      borderWidth:1.5,
      pointRadius:ptR,
      pointBackgroundColor:ptBg,
      pointBorderColor:ptBd,
      pointBorderWidth:ptBdW,
      pointHoverRadius:5,
      fill:true,
      tension:0.3,
    }];
    showLegend=false;
    wrap.style.height='170px';

    if(hasPT){
      inlinePlugins=[{
        id:'ptLabels',
        afterDatasetsDraw(chart){
          const c=chart.ctx, meta=chart.getDatasetMeta(0), area=chart.chartArea;
          [[peakIdx,'#ef4444','above'],[troughIdx,'#3b82f6','below']].forEach(([i,clr,pos])=>{
            if(i<0||!meta.data[i]) return;
            const {x,y}=meta.data[i];
            drawDetailLabel(c,x,y,prices[i],clr,pos,area);
          });
        }
      }];
    }
  }

  wrap.style.display='block';
  const ctx=document.getElementById('detailChart').getContext('2d');
  _detailChart=new Chart(ctx,{
    type:'line',
    data:{labels:allLabels,datasets},
    plugins:inlinePlugins,
    options:{
      responsive:true,
      maintainAspectRatio:false,
      layout:{padding:{top:isAll?0:28,bottom:isAll?0:28}},
      plugins:{
        legend:{
          display:showLegend,
          position:'bottom',
          labels:{font:{size:10},boxWidth:10,padding:6,usePointStyle:true}
        },
        tooltip:{
          callbacks:{
            label:c=>`${c.dataset.label} / ${fmtAmt(c.parsed.y)}`
          }
        }
      },
      scales:{
        x:{ticks:{maxTicksLimit:6,font:{size:10}},grid:{display:false}},
        y:{ticks:{callback:v=>fmtAmt(v),font:{size:10},maxTicksLimit:5}}
      }
    }
  });
}

function renderFavPage(){

    grid.innerHTML='<div class="fav-empty">저장된 관심 아파트가 없습니다.<br>홈에서 ★ 버튼을 탭하여 추가하세요.</div>';

  grid.innerHTML=favs.map(name=>{

      .sort((a,b)=>b.deal_date.localeCompare(a.deal_date));

    const uniqueAreas=[...new Set(allTrades.map(t=>Math.round(t.area)))].sort((a,b)=>a-b)
      .map(a=>`${a}㎡`).join(' · ');

    const infoRows=[
      gugun&&dong?`<div class="fav-info-row"><span class="fav-info-lbl">주소</span><span class="fav-info-val">대구광역시 ${esc(gugun)} ${esc(dong)}</span></div>`:'',
      byear?`<div class="fav-info-row"><span class="fav-info-lbl">입주</span><span class="fav-info-val">${byear}년${yearsOld?' ('+yearsOld+'년차)':''}</span></div>`:'',
      uniqueAreas?`<div class="fav-info-row"><span class="fav-info-lbl">평형</span><span class="fav-info-val">${uniqueAreas}</span></div>`:'',
      `<div class="fav-info-row"><span class="fav-info-lbl">총 거래</span><span class="fav-info-val">${allTrades.length}건</span></div>`,
    ].filter(Boolean).join('');

    const rows=trades.length
      ? trades.map(t=>`<div class="fav-tr">
          <span class="fav-tr-date">${t.deal_date}</span>
          <span class="fav-tr-price">${fmtAmt(t.amount)}</span>
          <span class="fav-tr-info">${fmtArea(t.area)}·${t.floor}층</span>
        </div>`).join('')
      : '<div style="color:var(--b5);font-size:12px;padding:6px 0">최근 거래 없음</div>';
    return `<div class="fav-card" onclick="openDetail('${safeName}','')">
      <div class="fav-card-hdr">
        <div class="fav-card-name">${esc(name)}</div>
        <button class="fav-del" onclick="event.stopPropagation();delFav('${safeName}',this)">✕</button>
      </div>
      <div class="fav-basic-info">${infoRows}</div>
      <div class="fav-trades">${rows}</div>
    </div>`;
  }).join('');
}

let _acT=null, _acI=-1;

function onFavInput(){
  const q=document.getElementById('favInp').value.trim();
  if(!q||!DB){ hideAC(); return; }
  clearTimeout(_acT);
  _acT=setTimeout(()=>showAC(q,'acList'),120);
}

function showAC(q,listId){
  const lower=q.toLowerCase();
  const matches=(DB?.apt_names||[]).filter(n=>n.toLowerCase().includes(lower)).slice(0,15);
  if(!matches.length){ hideAC(); return; }
  _acI=-1;
  // 위치 조회용 맵
  const locMap={};
  (DB.transactions||[]).forEach(t=>{ if(!locMap[t.apt_name]) locMap[t.apt_name]={g:t.gugun,d:t.dong}; });
  const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');
  const list=document.getElementById(listId);
  list.innerHTML=matches.map((n,i)=>{
    const hi=esc(n).replace(re,m=>`<b>${m}</b>`);
    const loc=locMap[n]||{};
    const locStr=loc.g?`${loc.g} ${loc.d||''}`.trim():'';
    return `<div class="ac-item" data-n="${esc(n)}" data-i="${i}"
      onmousedown="pickFavApt('${n.replace(/'/g,"\\'")}','${listId}')">
      <span class="ac-name">${hi}</span>${locStr?`<span class="ac-loc">${esc(locStr)}</span>`:''}
    </div>`;
  }).join('');
  list.style.display='block';
}

function hideAC(){ setTimeout(()=>{ document.getElementById('acList').style.display='none'; },180); }

function onFavKey(e){
  const items=document.querySelectorAll('#acList .ac-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){ _acI=Math.min(_acI+1,items.length-1); hiAC(items); }
  else if(e.key==='ArrowUp'){ _acI=Math.max(_acI-1,0); hiAC(items); }
  else if(e.key==='Enter'&&_acI>=0){ e.preventDefault(); pickFavApt(items[_acI].dataset.n,'acList'); }
  else if(e.key==='Escape') hideAC();
}

function hiAC(items){ items.forEach((el,i)=>el.classList.toggle('focused',i===_acI)); if(_acI>=0) items[_acI].scrollIntoView({block:'nearest'}); }

function pickFavApt(name,listId){
  document.getElementById('favInp').value=name;
  document.getElementById(listId).style.display='none';
  openDetail(name,'');
}

function openCsvModal(){

  const today=todayISO();
  document.getElementById('csvDateFrom').value=addDays(today,-30);
  document.getElementById('csvDateTo').value=today;

function closeCsvModal(){
  document.getElementById('csvOverlay').classList.remove('open');
}
function csvToggleAll(cb){
  document.querySelectorAll('.csv-dist-item').forEach(el=>{ el.checked=cb.checked; });
}
function setCsvRange(type){
  const today=todayISO();
  const from=document.getElementById('csvDateFrom');
  const to=document.getElementById('csvDateTo');
  to.value=today;
  if(type==='7d')  from.value=addDays(today,-7);
  else if(type==='30d') from.value=addDays(today,-30);
  else if(type==='3m')  from.value=addDays(today,-90);
  else if(type==='year') from.value=`${new Date().getFullYear()}-01-01`;
  else { from.value='2000-01-01'; to.value=today; }
}
function executeCsvDownload(){
  const from=document.getElementById('csvDateFrom').value;
  const to=document.getElementById('csvDateTo').value;
  if(!from||!to){ showToast('날짜를 선택해 주세요.'); return; }
  const selDists=new Set([...document.querySelectorAll('.csv-dist-item:checked')].map(el=>el.value));
  const allChecked=document.getElementById('csvDistAll')?.checked;
  let rows=DB.transactions.filter(t=>{
    const d=t.deal_date||'';
    return d>=from && d<=to && (allChecked||selDists.has(t.gugun));
  });
  if(!rows.length){ showToast('해당 조건의 데이터가 없습니다.'); return; }
  rows.sort((a,b)=>a.deal_date.localeCompare(b.deal_date));
  const header=['계약일','신고일','자치구','동','단지명','전용면적(㎡)','평수','층','거래금액(만원)'];
  const data=[header,...rows.map(t=>[
    t.deal_date, t.rgst_date||'', t.gugun, t.dong, t.apt_name,
    t.area, t.area?Math.round(t.area/0.78/3.3058):'',
    t.floor, t.amount,
  ])].map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob(['﻿'+data],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`대구실거래가_${from}~${to}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`${rows.length}건 다운로드 완료`);
  closeCsvModal();
}
</script>

<!-- CSV 다운로드 모달 -->
<div class="csv-overlay" id="csvOverlay" onclick="if(event.target===this)closeCsvModal()">
  <div class="csv-sheet">
    <div class="csv-title">CSV 다운로드</div>
    <div class="csv-label">기간</div>
    <div class="csv-dates">
      <input type="date" id="csvDateFrom">
      <input type="date" id="csvDateTo">
    </div>
    <div class="csv-quick">
      <button class="csv-qbtn" onclick="setCsvRange('7d')">최근 7일</button>
      <button class="csv-qbtn" onclick="setCsvRange('30d')">최근 30일</button>
      <button class="csv-qbtn" onclick="setCsvRange('3m')">최근 3개월</button>
      <button class="csv-qbtn" onclick="setCsvRange('year')">올해 전체</button>
      <button class="csv-qbtn" onclick="setCsvRange('all')">전체</button>
    </div>
    <div class="csv-label">자치구</div>
    <div class="csv-districts" id="csvDistWrap"></div>
    <div class="csv-actions">
      <button class="csv-dl-btn" onclick="executeCsvDownload()">⬇ 다운로드</button>
      <button class="csv-cancel-btn" onclick="closeCsvModal()">취소</button>
    </div>
  </div>
</div>
</body>
