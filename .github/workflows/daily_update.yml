name: 아파트 실거래 일일 업데이트

on:
  schedule:
    - cron: '3 22 * * *'   # 매일 오전 7:03 KST (= 전날 22:03 UTC)
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: apt-data-${{ github.run_number }}
          restore-keys: |
            apt-data-

      - name: 마스터 파일 없으면 7년 초기 수집, 있으면 일일 업데이트
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          mkdir -p data
          if [ ! -f "data/아파트실거래_마스터.xlsx" ] || [ $(stat -c%s "data/아파트실거래_마스터.xlsx" 2>/dev/null || echo 0) -lt 10000 ]; then
            echo "마스터 파일 없음 → 7년 초기 수집 시작"
            python fetch_history_daegu.py
          else
            echo "마스터 파일 있음 → 일일 업데이트"
            python apt_trade_fetcher.py
          fi

      - name: HTML 생성
        run: |
          python generate_html.py
          cp "아파트실거래_카드뷰.html" index.html

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html "아파트실거래_카드뷰.html"
          git diff --staged --quiet || git commit -m "chore: 실거래 업데이트 $(date +'%Y-%m-%d KST')"
          git push
