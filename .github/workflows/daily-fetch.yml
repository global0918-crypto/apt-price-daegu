name: Daily Update Daegu Apt Price

on:
  schedule:
    - cron: "0 22 * * *"   # KST 07:00
    - cron: "30 22 * * *"  # KST 07:30
    - cron: "0 23 * * *"   # KST 08:00
    - cron: "0 0 * * *"    # KST 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if already ran today
        id: check
        env:
          TZ: Asia/Seoul
        run: |
          TODAY_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          LAST_UPDATE=$(TZ='Asia/Seoul' git log -1 --format='%ad' --date='format-local:%Y-%m-%d' -- data/transactions.json 2>/dev/null || echo "")
          echo "오늘 (KST): $TODAY_KST"
          echo "마지막 업데이트: $LAST_UPDATE"
          if [ "$TODAY_KST" = "$LAST_UPDATE" ]; then
            echo "already_ran=true" >> $GITHUB_OUTPUT
            echo "✓ 오늘 이미 실행됨. 스킵."
          else
            echo "already_ran=false" >> $GITHUB_OUTPUT
            echo "→ 오늘 첫 실행. 진행."
          fi

      - name: Setup Python
        if: steps.check.outputs.already_ran == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.already_ran == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch 매매 데이터
        if: steps.check.outputs.already_ran == 'false'
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_daegu.py

      - name: Fetch 전월세 데이터
        if: steps.check.outputs.already_ran == 'false'
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_daegu_rent.py

      - name: Generate history JSON
        if: steps.check.outputs.already_ran == 'false'
        run: python export_history.py

      - name: Commit & push if changed
        if: steps.check.outputs.already_ran == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/transactions.json data/history.json data/아파트실거래_마스터.xlsx data/rent_transactions.json || true
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "chore: 데이터 자동 갱신 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git push
          fi
