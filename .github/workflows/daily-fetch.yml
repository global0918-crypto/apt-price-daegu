name: Daily Update Daegu Apt Price

on:
  schedule:
    - cron: "0 22 * * *"   # KST 07:00
    - cron: "30 22 * * *"  # KST 07:30
    - cron: "0 23 * * *"   # KST 08:00
    - cron: "0 0 * * *"    # KST 09:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check 매매 status
        id: check_sale
        run: |
          TODAY_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          LAST=$(TZ='Asia/Seoul' git log -1 --format='%ad' --date='format-local:%Y-%m-%d' -- data/transactions.json 2>/dev/null || echo "")
          echo "매매 마지막 업데이트: $LAST (오늘: $TODAY_KST)"
          if [ "$TODAY_KST" = "$LAST" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "✓ 매매 오늘 완료. 스킵."
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "→ 매매 실행 필요."
          fi

      - name: Check 전월세 status
        id: check_rent
        run: |
          TODAY_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          LAST=$(TZ='Asia/Seoul' git log -1 --format='%ad' --date='format-local:%Y-%m-%d' -- data/rent_transactions.json 2>/dev/null || echo "")
          echo "전월세 마지막 업데이트: $LAST (오늘: $TODAY_KST)"
          if [ "$TODAY_KST" = "$LAST" ]; then
            echo "done=true" >> $GITHUB_OUTPUT
            echo "✓ 전월세 오늘 완료. 스킵."
          else
            echo "done=false" >> $GITHUB_OUTPUT
            echo "→ 전월세 실행 필요."
          fi

      - name: Setup Python
        if: steps.check_sale.outputs.done == 'false' || steps.check_rent.outputs.done == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check_sale.outputs.done == 'false' || steps.check_rent.outputs.done == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch 매매 데이터
        if: steps.check_sale.outputs.done == 'false'
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_daegu.py

      - name: Fetch 전월세 데이터
        if: steps.check_rent.outputs.done == 'false'
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python fetch_daegu_rent.py

      - name: Generate history JSON
        if: steps.check_sale.outputs.done == 'false'
        run: python export_history.py

      - name: Generate 카드뷰 HTML
        if: steps.check_sale.outputs.done == 'false' || steps.check_rent.outputs.done == 'false'
        run: python generate_html.py

      - name: Commit & push if changed
        if: steps.check_sale.outputs.done == 'false' || steps.check_rent.outputs.done == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/transactions.json data/history.json data/아파트실거래_마스터.xlsx data/rent_transactions.json data/rent_history.json data/apt_info.json 아파트실거래_카드뷰.html || true
          if git diff --cached --quiet; then
            echo "변경사항 없음 — 커밋 생략"
          else
            git commit -m "chore: 데이터 자동 갱신 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git push
          fi
