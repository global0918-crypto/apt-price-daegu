name: 대구 아파트 실거래 데이터 갱신

on:
  schedule:
    - cron: '0 1 * * *'   # 매일 오전 10:00 KST (= 01:00 UTC)
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 데이터 수집 (fetch_daegu.py)
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          mkdir -p data
          python fetch_daegu.py

      - name: 카드뷰 재생성 (generate_html.py)
        run: python generate_html.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/transactions.json
          [ -f "data/아파트실거래_마스터.xlsx" ] && git add "data/아파트실거래_마스터.xlsx" || true
          [ -f "아파트실거래_카드뷰.html" ] && git add "아파트실거래_카드뷰.html" || true
          git diff --staged --quiet && echo "변경 없음, 스킵" && exit 0
          git commit -m "data: 실거래 데이터 자동 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d')"
          git push
